name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
      tag:
        description: 'Release tag (e.g. v1.0.0, leave empty to skip release)'
        required: false
        type: string

env:
  BUILD_TYPE: ${{ github.event.inputs.profile || 'release' }}

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ─── Android SDK ──────────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ─── Java ─────────────────────────────────────────────────────────────────
      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Android platform & build tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      # ─── Generate native Android project ──────────────────────────────────────
      - name: Expo prebuild
        run: |
          npx expo prebuild --platform android --clean
          echo "android_generated=true" >> $GITHUB_ENV

      # ─── Configure signing for release builds ─────────────────────────────────
      - name: Configure release signing
        if: env.BUILD_TYPE == 'release'
        run: |
          # Generate a debug keystore for signing (replace with your own
          # KEYSTORE_BASE64 + KEYSTORE_PASSWORD secrets for production releases)
          keytool \
            -genkeypair \
            -v \
            -storetype PKCS12 \
            -keystore android/app/ttsui-release.keystore \
            -alias ttsui \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" \
            -keypass "${{ secrets.KEYSTORE_PASSWORD || 'android' }}" \
            -dname "CN=tts_ui, OU=Dev, O=Dev, L=City, ST=State, C=US"

          cat >> android/app/build.gradle << 'GRADLE'

          android {
              signingConfigs {
                  release {
                      storeFile file("ttsui-release.keystore")
                      storePassword "${{ secrets.KEYSTORE_PASSWORD || 'android' }}"
                      keyAlias "ttsui"
                      keyPassword "${{ secrets.KEYSTORE_PASSWORD || 'android' }}"
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          GRADLE

      # ─── Build APK ────────────────────────────────────────────────────────────
      - name: Build APK
        id: gradle
        run: |
          if [ "${{ env.BUILD_TYPE }}" = "release" ]; then
            BUILD_TASK="assembleRelease"
            APK_OUT="android/app/build/outputs/apk/release/app-release.apk"
          else
            BUILD_TASK="assembleDebug"
            APK_OUT="android/app/build/outputs/apk/debug/app-debug.apk"
          fi

          echo "Running Gradle task: $BUILD_TASK"
          echo "APK_OUTPUT=$APK_OUT" >> $GITHUB_ENV

          cd android
          ./gradlew $BUILD_TASK --no-daemon --warning-mode=all
          cd ..

          echo "--- APK files ---"
          find android -name "*.apk" -type f 2>/dev/null

          if [ ! -f "$APK_OUT" ]; then
            echo "::error::APK not found at $APK_OUT"
            exit 1
          fi

          echo "apk_path=$APK_OUT" >> $GITHUB_OUTPUT
          echo "APK size: $(du -h $APK_OUT | cut -f1)"

      # ─── Rename APK with version ──────────────────────────────────────────────
      - name: Rename APK
        id: meta
        run: |
          TAG="${{ github.event.inputs.tag }}"
          if [ -z "$TAG" ] && [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          if [ -z "$TAG" ]; then
            TAG="v$(cat package.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')"
          fi

          PROFILE="${{ env.BUILD_TYPE }}"
          NEW_APK="tts_ui-$TAG-$PROFILE.apk"
          cp "${{ env.APK_OUTPUT }}" "$NEW_APK"
          echo "Final APK: $NEW_APK"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "apk_name=$NEW_APK" >> $GITHUB_OUTPUT
          echo "release_title=TTS UI $TAG ($PROFILE)" >> $GITHUB_OUTPUT

      # ─── Upload APK artifact ──────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts_ui-android-apk
          path: ${{ steps.meta.outputs.apk_name }}
          retention-days: 30

      # ─── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        if: steps.meta.outputs.tag != ''
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_title }}
          body: |
            ## TTS UI — Android APK

            **Build type:** `${{ env.BUILD_TYPE }}`
            **Commit:** `${{ github.sha }}`
            **Generated by:** GitHub Actions (local Android SDK)

            ### What's in this release
            Android APK built directly in GitHub Actions runners — no cloud build service required.

            Download the APK below and install it on your Android device.
          artifacts: ${{ steps.meta.outputs.apk_name }}
          draft: false
          prerelease: ${{ env.BUILD_TYPE == 'debug' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
