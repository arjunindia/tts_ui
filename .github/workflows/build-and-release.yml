name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: false
        type: string

env:
  EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}

jobs:
  build:
    name: EAS Build (Android)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Build
        id: eas
        run: |
          echo "Starting EAS build with profile: $EAS_PROFILE"
          eas build \
            --platform android \
            --profile "$EAS_PROFILE" \
            --non-interactive \
            --json \
            --message "GitHub Actions build from ${{ github.sha }}" \
            > eas_build.json
          echo "--- EAS Output ---"
          cat eas_build.json

          # Extract build metadata
          python3 << 'EOF'
          import json, sys, os

          with open("eas_build.json") as f:
              data = json.load(f)

          build = data[0]
          build_id = build.get("id", "")
          build_url = build.get("expoUrl", "")
          build_status = build.get("status", "unknown")

          with open(os.environ["GITHUB_OUTPUT"], "a") as out:
              out.write(f"build_id={build_id}\n")
              out.write(f"build_url={build_url}\n")
              out.write(f"build_status={build_status}\n")

          print(f"BUILD_ID={build_id}")
          print(f"BUILD_STATUS={build_status}")
          print(f"BUILD_URL={build_url}")
          EOF

      - name: Set outputs
        id: meta
        run: |
          # Determine release tag
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            TAG="${{ github.event.inputs.tag }}"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v$(cat package.json | python3 -c 'import sys,json; print(json.load(sys.stdin)["version"])')"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "release_title=Release $TAG" >> $GITHUB_OUTPUT
          echo "Using tag: $TAG"

      # ─── Poll for build completion ────────────────────────────────────────────
      - name: Wait for build to finish
        if: steps.eas.outputs.build_status == 'pending'
        run: |
          echo "Build is pending — polling EAS for completion..."
          BUILD_ID="${{ steps.eas.outputs.build_id }}"
          MAX_WAIT=2700   # 45 min max
          INTERVAL=90
          ELAPSED=0

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
            STATUS=$(eas build:$BUILD_ID --json 2>/dev/null | \
              python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['status'])")
            echo "[${ELAPSED}s] Build status: $STATUS"
            if [ "$STATUS" = "finished" ]; then
              echo "build_status=finished" >> $GITHUB_OUTPUT
              exit 0
            elif [ "$STATUS" = "errored" ]; then
              echo "build_status=errored" >> $GITHUB_OUTPUT
              echo "::error::EAS Build errored. Check: ${{ steps.eas.outputs.build_url }}"
              exit 1
            elif [ "$STATUS" = "canceled" ]; then
              echo "build_status=canceled" >> $GITHUB_OUTPUT
              exit 1
            fi
          done
          echo "::warning::Timed out waiting for build"

      # ─── Fetch finished build details ───────────────────────────────────────
      - name: Get finished build details
        id: details
        run: |
          BUILD_ID="${{ steps.eas.outputs.build_id }}"
          if [ -z "$BUILD_ID" ]; then
            echo "No build ID found — skipping details"
            exit 0
          fi
          eas build:$BUILD_ID --json > build_details.json 2>&1 || true
          echo "--- Build Details ---"
          cat build_details.json

          python3 << 'EOF'
          import json, os

          try:
              with open("build_details.json") as f:
                  raw = f.read()
                  data = json.loads(raw) if raw.strip().startswith("[") else []

              if not data:
                  print("Could not parse build details JSON")
                  exit(0)

              build = data[0]
              status = build.get("status", "unknown")
              apk_url = build.get("artifacts", {}).get("android", "")
              build_url = build.get("expoUrl", build.get("webUrl", ""))

              with open(os.environ["GITHUB_OUTPUT"], "a") as out:
                  out.write(f"apk_url={apk_url}\n")
                  out.write(f"build_url={build_url}\n")
                  out.write(f"status={status}\n")

              print(f"Status: {status}")
              print(f"APK URL: {apk_url}")
              print(f"Build URL: {build_url}")
          except Exception as e:
              print(f"Error parsing details: {e}")
          EOF

      # ─── Download APK ────────────────────────────────────────────────────────
      - name: Download APK
        if: steps.details.outputs.apk_url
        run: |
          echo "Downloading APK from: ${{ steps.details.outputs.apk_url }}"
          curl -L -o app-release.apk "${{ steps.details.outputs.apk_url }}"
          ls -lh app-release.apk

      - name: Upload APK artifact
        if: steps.details.outputs.apk_url
        uses: actions/upload-artifact@v4
        with:
          name: android-apk-${{ steps.meta.outputs.tag }}
          path: app-release.apk
          retention-days: 30

      # ─── Create GitHub Release ───────────────────────────────────────────────
      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.release_title }}
          body: |
            ## TTS UI — Android APK

            **Profile:** `${{ env.EAS_PROFILE }}`
            **Commit:** `${{ github.sha }}`
            **EAS Build ID:** `${{ steps.eas.outputs.build_id }}`
            **EAS Build Status:** `${{ steps.details.outputs.status || steps.eas.outputs.build_status }}`

            ### Download APK
            Direct download: ${{ steps.details.outputs.apk_url || steps.eas.outputs.build_url }}

            ### Expo Dashboard
            View build details: ${{ steps.eas.outputs.build_url }}
          artifacts: ${{ steps.details.outputs.apk_url && 'app-release.apk' || '' }}
          draft: false
          prerelease: ${{ env.EAS_PROFILE == 'preview' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Fail on error
        if: steps.eas.outputs.build_status == 'errored' || steps.details.outputs.status == 'errored'
        run: |
          echo "::error::Build failed. Check: ${{ steps.eas.outputs.build_url }}"
          exit 1
