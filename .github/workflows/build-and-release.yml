name: Build & Release

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options:
          - preview
          - production

env:
  EAS_PROFILE: ${{ github.event.inputs.profile || 'production' }}

jobs:
  build:
    name: EAS Local Build (Android)
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ─── Node.js ───────────────────────────────────────────────────────────────
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ─── Android SDK (required for eas build --local) ──────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set environment variables
        run: |
          echo "JAVA_HOME=$JAVA_HOME" >> $GITHUB_ENV
          echo "ANDROID_HOME=$ANDROID_HOME" >> $GITHUB_ENV
          echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV

      - name: Accept Android licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true

      - name: Install Android platform & build tools
        run: |
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;27.0.12077973" \
            "cmake;3.22.1"

      # ─── EAS CLI + Local build ─────────────────────────────────────────────────
      - name: Install EAS CLI
        run: npm install -g eas-cli

      - name: EAS Local Build
        id: eas
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          echo "Running: eas build --platform android --profile $EAS_PROFILE --local --non-interactive"
          eas build \
            --platform android \
            --profile "$EAS_PROFILE" \
            --local \
            --non-interactive \
            --message "GitHub Actions build from ${{ github.sha }}"
          echo "--- Looking for APK ---"
          find . -name "*.apk" -type f 2>/dev/null

      # ─── Find APK ────────────────────────────────────────────────────────────
      - name: Locate APK
        id: apk
        run: |
          APK=$(find . -path "./node_modules" -prune -o -name "*.apk" -type f -print 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "::error::No APK found after build"
            exit 1
          fi
          echo "Found APK: $APK"
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "apk_size=$(du -h $APK | cut -f1)" >> $GITHUB_OUTPUT
          ls -lh "$APK"

      # ─── Version from package.json ─────────────────────────────────────────────
      - name: Get version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-$(echo '${{ github.sha }}' | cut -c1-7)" >> $GITHUB_OUTPUT
          echo "release_title=TTS UI v${VERSION} ($(echo '${{ github.sha }}' | cut -c1-7}))" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      # ─── Upload artifact ──────────────────────────────────────────────────────
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tts_ui-android-apk-v${{ steps.version.outputs.version }}
          path: ${{ steps.apk.outputs.apk_path }}
          retention-days: 30

      # ─── GitHub Release (auto on push to main) ────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.release_title }}
          body: |
            ## TTS UI — Android APK

            **Version:** `${{ steps.version.outputs.version }}`
            **Profile:** `${{ env.EAS_PROFILE }}`
            **Commit:** `${{ github.sha }}`
            **Branch:** `${{ github.ref_name }}`
            **Built by:** EAS local build (GitHub Actions)

            ### Install
            Download the APK below and install it on your Android device.
            Enable "Install from unknown sources" in your device settings if prompted.
          files: ${{ steps.apk.outputs.apk_path }}
          draft: false
          prerelease: ${{ env.EAS_PROFILE == 'preview' }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
